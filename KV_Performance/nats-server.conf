# =============================================================================
# NATS Server configuration - KV performance testing
# =============================================================================
# Start with:
#   GOMEMLIMIT=4GiB nats-server -c nats-server.conf
# =============================================================================

# ---- Client connections -----------------------------------------------------
host: "0.0.0.0"
port: 4222

# HTTP monitoring endpoint (http://localhost:8222)
http_port: 8222

server_name: kv-perf-1

# ---- JetStream (global enable) ----------------------------------------------
# store_dir points at a SUB-DIRECTORY relative to where the server is started.
# The directory is created automatically on first start.
jetstream {
  store_dir: "./jetstream"
  max_memory_store: 1GB
  max_file_store: 200GB
}

# ---- Accounts ----------------------------------------------------------------
accounts {
  # System account - server internals, monitoring, $SYS.> subjects
  SYS {
    users: [
      { user: "sys", password: "sys" }
    ]
  }

  # Application account - JetStream / KV lives here
  APP {
    jetstream: enabled
    users: [
      { user: "app", password: "app" }
    ]
  }
}

# Designate the system account
system_account: SYS

# Unauthenticated clients are mapped to the 'app' user in the APP account,
# so plain `nats kv ...` commands work without credentials.
no_auth_user: "app"
